services:
  - type: web
    runtime: docker
    name: gestor-identidades-demo
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: SESSION_COOKIE_SECURE
        value: "true"
      - key: SESSION_SECRET
        generateValue: true
      - key: SEED_DEMO_DATA
        value: "false"
      - key: DATABASE_URL
        fromDatabase:
          name: gestor-identidades-db
          property: connectionString
      - key: BOOTSTRAP_ADMIN_FULL_NAME
        sync: false
      - key: BOOTSTRAP_ADMIN_EMAIL
        sync: false
      - key: BOOTSTRAP_ADMIN_PASSWORD
        sync: false

databases:
  - name: gestor-identidades-db
    databaseName: gestor_identidades
    user: gestor_identidades
